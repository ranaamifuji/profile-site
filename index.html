<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>網藤礼奈（Amifuji Rana）</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 1.5rem 1.25rem 3rem;
      font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      font-size: 1rem;
      line-height: 1.7;
      color: #1a1a1a;
      background: #f7f5f2;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    main {
      max-width: 36rem;
      margin: 0 auto;
    }

    .avatar {
      width: 4.5rem;
      height: 4.5rem;
      margin: 0 0 1.25rem;
      border-radius: 50%;
      background: #2c4a3e;
      color: #f0ebe3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    h1 {
      margin: 0 0 0.35rem;
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 700;
      line-height: 1.3;
    }

    .en-name {
      margin: 0 0 1.25rem;
      font-size: 0.95rem;
      color: #555;
    }

    .intro {
      margin: 0 0 1.75rem;
    }

    h2 {
      margin: 0 0 0.6rem;
      font-size: 1.05rem;
      font-weight: 700;
      color: #2c4a3e;
    }

    section {
      margin-bottom: 1.75rem;
    }

    ul {
      margin: 0;
      padding-left: 1.25rem;
    }

    li {
      margin-bottom: 0.35rem;
    }

    a {
      color: #1a4d7c;
    }

    .contact {
      margin: 0;
    }
  </style>
</head>
<body>
  <main>
    <div class="avatar" aria-hidden="true">AR</div>

    <h1>網藤礼奈</h1>
    <p class="en-name">Amifuji Rana</p>

    <p class="intro">
      新卒でリクルートに入社し、法人営業、営業企画・推進、センター企画に従事。手触り感のある企画・実行支援が得意です。
    </p>

    <section>
      <h2>好きなこと</h2>
      <ul>
        <li>バイブコーディング</li>
        <li>新しいことに挑戦すること</li>
        <li>アニメ・ドラマ鑑賞</li>
      </ul>
    </section>

    <section>
      <h2>これまでの経験</h2>
      <ul>
        <li>求人広告法人営業</li>
        <li>センターオペレーション企画設計</li>
        <li>テック導入</li>
        <li>営業企画・推進（目標設計・モニタリング設計構築）</li>
        <li>インタビューアー</li>
        <li>新卒採用支援</li>
      </ul>
    </section>

    <section>
      <h2>連絡先</h2>
      <p class="contact">
        <a href="https://www.facebook.com/p/%E7%B6%B2%E8%97%A4%E7%A4%BC%E5%A5%88-61577946767525/" target="_blank" rel="noopener noreferrer">Facebook（網藤礼奈）</a>
      </p>
    </section>

    <section>
      <h2>実績リンク</h2>
      <p class="contact">（今後、公開した成果物のリンクをここに追加します）</p>
    </section>
  </main>
</body>
</html>
